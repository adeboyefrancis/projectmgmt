spring:
  datasource:
    url: jdbc:h2:mem:projectmgmt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: admin
    password: password

  header:
    frame-options:
      sameorigin: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    # This is the magic line that fixes your error
    defer-datasource-initialization: true 
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080
